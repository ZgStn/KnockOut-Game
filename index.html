<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <title>Knock Out</title>
</head>

<body>
    <!--Wrapper contains the application-->
    <div class="app-wrapper">
        <h1>Knockout Game</h1>
        <h2>Choose your Knockout Number:</h2>

        <div class="num__pad">
            <div class="row">
                <button class="btn" id="btn__6" value="6">6</button>
                <button class="btn" id="btn__7" value="7">7</button>
                <button class="btn" id="btn__8" value="8">8</button>
                <button class="btn" id="btn__9" value="9">9</button>
            </div>
        </div>

        <div class="scr">
            <p id="screen">?</p>
        </div>
      

        <div class="dice-wrapper">
            <h3>Roll The Dices!</h3>



            <div class="dices">
                <img src="img/dice-1.png" alt="" class="dice-1">
                <img src="img/dice-1.png" alt="" class="dice-2">
            </div>

            <p class="dice-sum"> Sum: 0</p>
            <h3 class="total-score">Total score: 0</h3>

            <div class="message-box"></div>

            <div class="button-container">
                <button class="btn-roll">Roll the Dices</button>
            </div>
            <div class="button-container2">
                <button class="btn-reset">Reset the Game</button>
            </div>

        </div>
    </div>

    
</body>

</html>
